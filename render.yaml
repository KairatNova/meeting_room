databases:
  - name: meeting-room-db
    plan: free

services:
  - type: web
    name: meeting-room-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-room-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      # IMPORTANT: update after frontend deploy if you rename the service.
      - key: CORS_ORIGINS
        value: https://meeting-room-frontend-zb0p.onrender.com
      # Free tier has no persistent disks; uploads will be ephemeral.
      - key: UPLOAD_DIR
        value: uploads

  - type: web
    env: static
    name: meeting-room-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # IMPORTANT: update if you rename the backend service.
      - key: VITE_API_URL
        value: https://meeting-room-backend-8exb.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

